name: Bug Report
description: Report a bug in frostpillar-btree
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```ts
        import { InMemoryBTree } from 'frostpillar-btree';

        const tree = new InMemoryBTree<number, string>({
          compareKeys: (a, b) => a - b,
        });

        // Steps that trigger the bug...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Runtime
      options:
        - Node.js (ESM)
        - Node.js (CJS)
        - Browser (IIFE bundle)
        - Browser (via bundler)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version (if applicable)
      placeholder: '24.0.0'

  - type: dropdown
    id: btree-class
    attributes:
      label: Which class is affected?
      options:
        - InMemoryBTree
        - ConcurrentInMemoryBTree
        - Both
        - Not sure

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, error messages, or screenshots.
