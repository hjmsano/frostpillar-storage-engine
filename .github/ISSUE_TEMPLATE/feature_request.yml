name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the API or behavior you'd like to see.
      placeholder: |
        ```ts
        // Example of the proposed API
        const result = tree.newMethod(...);
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered or workarounds you're currently using.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the library does this affect?
      options:
        - InMemoryBTree (single-process)
        - ConcurrentInMemoryBTree (multi-process)
        - Both
        - Build / packaging
        - Documentation
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples from other libraries, or references.
